
#set $refresh_i3status killall -SIGUSR1 i3status

exec --no-startup-id xss-lock --transfer-sleep-lock -- i3lock --nofork
exec --no-startup-id nm-applet
exec --no-startup-id sh ~/dotfiles/i3/xampp.sh
exec --no-startup-id sh ~/dotfiles/i3/scripts/gpu
#exec --no-startup-id sh ~/dotfiles/i3/mocp.sh



exec_always --no-startup-id feh --no-fehbg --bg-scale ~/dotfiles/wp.png

exec_always --no-startup-id $HOME/dotfiles/polybar/start.sh
#exec_always --no-startup-id kdeconnect-indicator
#exec_always --no-startup-id telegram-desktop



exec --no-startup-id picom -CGb --config ~/dotfiles/picom/picom.conf
exec --no-startup-id /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec --no-startup-id blueberry-tray
#exec --no-startup-id udisksctl mount -b /dev/nvme0n1p3
#notification deamon 
exec --no-startup-id dbus-launch dunst --config ~/dotfiles/dunst/dunstrc
exec --no-startup-id sh ~/dotfiles/.screenlayout/dual.sh
exec --no-startup-id thunderbird
#exec --no-startup-id code
#exec --no-startup-id spotify
#exec --no-startup-id google-chrome
exec --no-startup-id ~/Downloads/Joplin.AppImage
exec --no-startup-id diodon

#set keyboard repeat rate
exec --no-startup-id xset r rate 220 50

#set redshift for eye
exec_always --no-startup-id redshift -x  -l 36.161526:36.160288 && redshift -O 4000 -l 36.161526:36.160288

exec --no-startup-id xinput --set-prop "PixArt HP X220 OpticalMouse" "libinput Accel Speed" -0.6
exec --no-startup-id xinput --set-prop 11 "libinput Accel Speed" -0.8
